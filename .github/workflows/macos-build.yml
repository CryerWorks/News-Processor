name: Build macOS binary

on:
  push:
    branches: [ master ]        # run automatically on every push to master
  workflow_dispatch:            # allow manual runs from the Actions tab

jobs:
  build:
    runs-on: macos-latest

    steps:
    # 1. Checkout the code
    - uses: actions/checkout@v4

    # 2. Set up Python (same version you use locally; 3.11 is fine)
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    # 3. Install build-time dependencies
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install \
          pyinstaller pandas openai python-dotenv scikit-learn python-docx

    # 4. Build the standalone executable with PyInstaller
    #    Command mirrors the instructions in README_mac_compile.txt
    - name: Build News-Processor app
      run: |
        pyinstaller --noconfirm --onefile \
          --add-data "Mundus_Icon.png:." \
          --add-data "TrainingData:TrainingData" \
          NewsProcessorGUI.py

    # 5. Upload the binary as an artifact
    - uses: actions/upload-artifact@v4
      with:
        name: NewsProcessor-macOS
        path: dist/NewsProcessorGUI        # adjust if PyInstaller names it differently
